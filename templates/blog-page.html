{% extends "base.html" %}

{% block extra_head %}
{# BlogPosting structured data for search engines and AI crawlers.
   Uses Microdata (no <script> tags needed). #}
{% endblock extra_head %}

{% block content %}
<article itemscope itemtype="https://schema.org/BlogPosting">
  {# Hidden metadata — display:none by default, readable by crawlers #}
  <meta itemprop="url" content="{{ current_url | safe }}">
  <meta itemprop="description" content="{{ page.description | default(value='') }}">
  <span itemprop="author" itemscope itemtype="https://schema.org/Person" hidden>
    <meta itemprop="name" content="{{ config.extra.author }}">
    <meta itemprop="url" content="{{ config.base_url }}">
  </span>

  {# Hero image — renders above title when page.extra.hero is set #}
  {%- if page.extra.hero %}
  <figure class="post-img post-img-hero">
    <picture>
      <source srcset="/img/{{ page.extra.hero }}" type="image/webp">
      <img
        src="/img/{{ page.extra.hero | replace(from='.webp', to='.jpg') }}"
        alt="{{ page.extra.hero_alt | default(value='') }}"
        loading="lazy"
        decoding="async">
    </picture>
  </figure>
  {%- endif %}

  {# Post header — sits in col 1 on wide screens #}
  <header>
    <h1 class="page-title" itemprop="headline">{{ page.title }}</h1>
    <p class="page-meta">
      <time datetime="{{ page.date | date(format='%Y-%m-%d') }}" itemprop="datePublished">
        {{ page.date | date(format="%B %-d, %Y") }}
      </time>
      {% if page.taxonomies.tags %}
        · {% for tag in page.taxonomies.tags %}
          <a href="{{ get_taxonomy_url(kind='tags', name=tag) }}"
             class="tag-link">#{{ tag }}</a>{% if not loop.last %}, {% endif %}
        {% endfor %}
      {% endif %}
    </p>
  </header>

  {# Markdown content renders here — images via shortcode slot into col 2 #}
  {{ page.content | safe }}
</article>

{# Prev / Next post navigation #}
{% if page.earlier or page.later %}
<nav aria-label="Post navigation" class="post-nav">
  <div>
    {% if page.later %}
    <a href="{{ page.later.permalink }}">← {{ page.later.title }}</a>
    {% endif %}
  </div>
  <div class="post-nav-next">
    {% if page.earlier %}
    <a href="{{ page.earlier.permalink }}">{{ page.earlier.title }} →</a>
    {% endif %}
  </div>
</nav>
{% endif %}

<p class="post-nav-back">
  <a href="/blog/">← All posts</a>
</p>
{% endblock content %}
